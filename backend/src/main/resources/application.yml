server:
  port: 8080

spring:
  application:
    name: silver-care-iot-backend
  datasource:
    url: jdbc:h2:mem:silvercare;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

silver-care:
  admin:
    username: ${SILVER_CARE_ADMIN_USERNAME:admin}
    password: ${SILVER_CARE_ADMIN_PASSWORD:change-me}
  gateway:
    enabled: true
    port: 9000
    idle-timeout-seconds: 180
    max-client-threads: 200
    client-queue-capacity: 200
    accept-backlog: 128
    max-frame-length-bytes: 8192
