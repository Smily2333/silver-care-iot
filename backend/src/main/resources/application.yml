server:
  port: 8080

spring:
  application:
    name: silver-care-iot-backend
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/silver_care?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: silvercare
    password: silvercare123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

silver-care:
  admin:
    username: ${SILVER_CARE_ADMIN_USERNAME:admin}
    password: ${SILVER_CARE_ADMIN_PASSWORD:change-me}
  gateway:
    enabled: true
    port: 9001
    idle-timeout-seconds: 180
    max-client-threads: 200
    client-queue-capacity: 200
    accept-backlog: 128
    max-frame-length-bytes: 8192
